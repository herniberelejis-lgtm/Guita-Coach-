<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guita Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Onboarding overlay (hidden once done) -->
<div id="onboarding-overlay" style="display:none;">
  <div class="onboarding-box">
    <h1>Guita Coach</h1>
    <p>Tu coach de finanzas personal. Contame un poco de vos para arrancar.</p>

    <form id="onboarding-form">
      <div class="form-group">
        <label>Tu nombre</label>
        <input type="text" name="name" placeholder="Hernán" required>
      </div>

      <div class="form-group">
        <label>Sueldo mensual neto ($)</label>
        <input type="number" name="monthly_income" placeholder="500000" required min="1">
      </div>

      <div class="form-group">
        <label>Día de cobro</label>
        <input type="number" name="payday" value="1" min="1" max="28" required>
      </div>

      <label style="font-size:.82rem;color:var(--muted);display:block;margin-bottom:8px;">
        Distribución del presupuesto (debe sumar 100%)
      </label>
      <div class="pct-row">
        <div class="form-group">
          <label>Necesidades %</label>
          <input type="number" name="necesidades_pct" value="50" min="0" max="100" required>
        </div>
        <div class="form-group">
          <label>Gustos %</label>
          <input type="number" name="gustos_pct" value="30" min="0" max="100" required>
        </div>
        <div class="form-group">
          <label>Ahorro %</label>
          <input type="number" name="ahorro_pct" value="20" min="0" max="100" required>
        </div>
      </div>
      <p class="pct-hint">Necesidades = alquiler, servicios, super. Gustos = salidas, ropa. Ahorro = inversiones.</p>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;">
        Empezar
      </button>
    </form>
  </div>
</div>

<!-- Hamburger for mobile -->
<button id="hamburger" aria-label="Menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- Main app shell -->
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-logo">
      <h1>Guita Coach</h1>
      <span>beta personal</span>
    </div>

    <nav>
      <a data-page="dashboard" href="#dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
        <span id="alert-badge" style="
          display:none;
          background:var(--danger);
          color:white;
          font-size:.65rem;
          font-weight:700;
          border-radius:99px;
          padding:1px 6px;
          margin-left:auto;
          min-width:18px;
          text-align:center;
        "></span>
      </a>

      <a data-page="transactions" href="#transactions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Transacciones
      </a>

      <a data-page="insights" href="#insights">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
        </svg>
        Proyecciones
      </a>

      <a data-page="chat" href="#chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Asesor
      </a>

      <a data-page="settings" href="#settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Configuración
      </a>
    </nav>

    <div class="sidebar-footer">
      Demo mode activo<br>
      <span style="font-size:.7rem;">Configurá .env para real</span>
    </div>
  </aside>

  <main id="main">
    <div class="spinner" style="display:block;margin:80px auto;"></div>
  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- JS — orden importa -->
<script src="/static/js/api.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/transactions.js"></script>
<script src="/static/js/insights.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/chat.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
